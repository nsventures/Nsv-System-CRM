services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskify-app
    restart: unless-stopped
    working_dir: /var/www
    environment:
      COMPOSER_PROCESS_TIMEOUT: 2000
    volumes:
      - .:/var/www
    networks:
      - taskify-net
    depends_on:
      - db

  web:
    image: nginx:alpine
    container_name: taskify-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - taskify-net
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: taskify-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: nsv_crm
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: taskify
      MYSQL_PASSWORD: secret
    volumes:
      - taskify-db-data:/var/lib/mysql
    networks:
      - taskify-net

  vite:
    image: node:20-alpine
    container_name: taskify-vite
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
    networks:
      - taskify-net
    depends_on:
      - app

volumes:
  taskify-db-data:
    driver: local

networks:
  taskify-net:
    driver: bridge
